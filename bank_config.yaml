bank_i:
  preset: genre/big-beat-blowout
  name: Big Beat Blowout
  bpm: 130
  key: Em
  notes: Big beat revival kit. Fat compressed breaks, squelchy 303 bass, rave stabs,
    and vocal shouts. Built for driving, hypnotic grooves that hit hard. Think Block
    Rockin' Beats meets Firestarter.
  pads:
    1: KIK punchy distorted fat one-shot
    2: SNR cracking loud compressed one-shot
    3: HAT crisp open metallic one-shot
    4: CLP big layered room one-shot
    5: BRK funk breakbeat compressed loop
    6: BAS acid 303 squelchy loop
    7: SYN rave stab hoover loop
    8: SYN acid lead distorted loop
    9: SYN filtered sweep build loop
    10: PRC shaker tambourine uptempo loop
    11: BRK amen chopped dirty loop
    12: VOX shout chant crowd chop-ready
C cowbell 808 noise one-shot
    11: FX riser build siren loop
    12: VOX chop attitude glitch chop-ready
bank_c:
  preset: genre/am-songwriter
  name: Am Songwriter
  bpm: 100
  key: Am
  notes: Scale-mapped pads for melodic expression. Pads 1-8 are A natural minor ascending,
    9-10 are bass notes, 11-12 are chord stabs. Classic singer-songwriter key.
  pads: {}
bank_d:
  preset: genre/crystal-chaos
  name: Crystal Chaos
  bpm: 135
  key: Fm
  notes: 'Crystal Castles appeared 3 times in Tiger Dust (Vietnam, BAPTISM, AFFECTION).
    The dark wing of the Brat Mode aesthetic. Bitcrushed everything, distorted synths,
    aggressive lo-fi textures. Pairs with brat-mode preset as the aggressive counterpart.

    '
  pads:
    1: KIK distorted crushed clipping hard one-shot
    2: SNR bitcrushed harsh noisy crunch one-shot
    3: HHT glitchy stuttered digital artifact one-shot
    4: PRC noise burst static crackle one-shot
    5: SYN bitcrushed lead screaming distorted loop
    6: VOX crushed processed dark distant vocal loop
    7: BAS distorted sub growling resonant bass loop
    8: SYN noise wash harsh digital texture loop
    9: DRM glitch stutter broken beat chopped loop
    10: PAD dark drone ominous swelling menace loop
    11: FX digital artifact error crash glitch loop
    12: SYN chaotic layered clashing tonal noise loop
bank_e:
  preset: genre/french-filter-house
  name: French Filter House
  bpm: 122
  key: Dm
  notes: 'Built from Spotify liked songs cluster (Modjo, Supermen Lovers, Dimitri
    From Paris) + YouTube electroclash presence (Miss Kittin, Fischerspooner). Late-90s/early-2000s
    French touch. Filtered disco samples, four-on-the-floor with swing, warm bass,
    chopped vocals.

    '
  pads:
    1: KIK four-on-the-floor punchy warm one-shot
    2: SNR clap tight disco reverb one-shot
    3: HHT open shimmery disco offbeat one-shot
    4: PRC conga slap funky tight one-shot
    5: GTR filtered disco funk wah loop
    6: BAS deep french house rolling sub loop
    7: SYN filtered sweep rising phaser pad loop
    8: VOX chopped disco diva pitched vocal loop
    9: STR string stab filtered orchestral disco loop
    10: KEY rhodes warm chord jazzy funk loop
    11: SYN acid squelch resonant filter bass loop
    12: FX vinyl crackle warm hiss texture loop
bank_f:
  preset: genre/purity-ring-dreams
  name: Purity Ring Dreams
  bpm: 108
  key: Ab
  notes: 'Purity Ring appeared 7 times in Tiger Dust — more than any other artist.
    This preset channels their specific production: granular vocal processing, layered
    ambient pads, delicate synth leads, sparse but textured drums. Complements the
    broader synth-pop-dreams preset with a more focused aesthetic.

    '
  pads:
    1: KIK soft deep sub thump one-shot
    2: SNR processed snap glassy reverb one-shot
    3: HHT delicate tiny sparkle click one-shot
    4: PRC metallic bell granular shimmer one-shot
    5: PAD lush warm evolving ambient pad loop
    6: VOX granular chopped pitched ethereal loop
    7: SYN delicate arp ascending crystalline loop
    8: PAD dark deep underwater swelling pad loop
    9: BAS soft sub pulse gentle throb loop
    10: SYN lead thin melody distant bright loop
    11: FX granular scatter vocal texture dust loop
    12: PAD reversed swell ambient breathe pad loop
bank_g:
  preset: genre/drum-loops
  name: Drum Loops
  bpm: 120
  key: XX
  notes: Pure rhythm — no melody, all genres, mix and match
  pads:
    1: BRK funk warm loop
    2: BRK funk raw loop
    3: BRK disco bright loop
    4: BRK disco soulful loop
    5: BRK electronic raw loop
    6: BRK electronic aggressive loop
    7: BRK electronic hype loop
    8: BRK electronic crunchy loop
    9: BRK electronic aggressive loop
    10: BRK electronic bitcrushed loop
    11: BRK house clean loop
    12: BRK house bright loop
bank_h:
  preset: genre/azealia-mode
  name: Azealia Mode
  bpm: 130
  key: Bbm
  notes: 'Built from recent Azealia Banks binge (Spotify recently played — 3 albums)
    plus 212 ft. Lazy Jay in Tiger Dust. House beats meets aggressive rap delivery.
    Art-pop deconstruction. Pairs with brat-mode as the hip-hop-inflected counterpart.

    '
  pads:
    1: KIK house deep thumping four-floor one-shot
    2: SNR sharp snappy tight crack one-shot
    3: HHT rapid rolling programmed trap one-shot
    4: CLP house clap reverb layered one-shot
    5: BAS house bouncing rolling sub bass loop
    6: VOX rapid-fire aggressive attitude rap loop
    7: SYN house stab bright filtered chord loop
    8: DRM house groove four-floor driving beat loop
    9: BAS acid squelch resonant 303 bass loop
    10: VOX chopped pitched processed diva vocal loop
    11: SYN dark arp menacing minor synth loop
    12: FX crowd hype energy attitude shout loop
