bank_a:
  name: Your Space
  notes: Bank A is yours — resample and chop on-device
bank_b:
  preset: genre/big-beat-blowout
  name: Big Beat Blowout
  bpm: 130
  key: Em
  notes: Big beat revival kit. Fat compressed breaks, squelchy 303 bass, rave stabs,
    and vocal shouts. Built for driving, hypnotic grooves that hit hard. Think Block
    Rockin' Beats meets Firestarter.
  pads:
    1: BRK big-beat fat kick-driven stomp loop
    2: BRK loud compressed break backbeat loop
    3: BRK open-hat metallic groove loop
    4: BRK room clap stack loop
    5: BRK funk breakbeat compressed loop
    6: BAS acid 303 squelchy loop
    7: SYN rave stab hoover loop
    8: SYN acid lead distorted loop
    9: SYN filtered sweep build loop
    10: PRC shaker tambourine uptempo loop
    11: BRK amen chopped dirty loop
    12: VOX shout chant crowd chop-ready
bank_c:
  preset: auto/test
  name: Azealia Mode
  bpm: 130
  key: Bbm
  notes: 'Built from recent Azealia Banks binge (Spotify recently played — 3 albums)
    plus 212 ft. Lazy Jay in Tiger Dust. House beats meets aggressive rap delivery.
    Art-pop deconstruction. Pairs with brat-mode as the hip-hop-inflected counterpart.

    '
  pads:
    1: KIK test one-shot
    2: SNR test one-shot
    3: HAT test one-shot
    4: CLP test one-shot
    5: BRK test loop
    6: BAS test loop
    7: SYN synth test loop
    8: BAS bass test loop
    9: PAD test loop
    10: FX test one-shot
    11: BRK test loop
    12: VOX test chop-ready
bank_d:
  preset: genre/breakbeat-bunker
  name: Breakbeat Bunker
  bpm: 92
  key: XX
  notes: 'Twelve different break personalities — nothing but BRK. Amen to disco, jungle
    to halftime, dusty vinyl to rave; built for chopping, layering, and live resequencing
    on the 404. Tempo is a loose center; match or warp on-device.

    '
  pads:
    1: BRK amen chopped dirty jungle loop
    2: BRK funk live drummer warm pocket loop
    3: BRK boom bap dusty vinyl crackle loop
    4: BRK soul swing neck-snap groove loop
    5: BRK jungle rolling fast ride loop
    6: BRK halftime heavy weighted downtempo loop
    7: BRK disco four-on-floor punchy loop
    8: BRK breakbeat syncopated skip ghost loop
    9: BRK latin percussion cowbell groove loop
    10: BRK industrial metallic machine loop
    11: BRK lofi warped tape wobble loop
    12: BRK rave big-beat hoover-era loop
