  notes: Bank A is yours — resample and chop on-device
bank_b:
  preset: genre/big-beat-blowout
  name: Big Beat Blowout
  bpm: 130
  key: Em
  notes: Big beat revival kit. Fat compressed breaks, squelchy 303 bass, rave stabs,
    and vocal shouts. Built for driving, hypnotic grooves that hit hard. Think Block
    Rockin' Beats meets Firestarter.
  pads:
    1: KIK punchy distorted fat one-shot
    2: SNR cracking loud compressed one-shot
    3: HAT crisp open metallic one-shot
    4: CLP big layered room one-shot
    5: BRK funk breakbeat compressed loop
    6: BAS acid 303 squelchy loop
    7: SYN rave stab hoover loop
    8: SYN acid lead distorted loop
    9: SYN filtered sweep build loop
    10: PRC shaker tambourine uptempo loop
    11: BRK amen chopped dirty loop
    12: VOX shout chant crowd chop-ready
bank_c:
  preset: genre/azealia-mode
  name: Azealia Mode
  bpm: 130
  key: Bbm
  notes: 'Built from recent Azealia Banks binge (Spotify recently played — 3 albums)
    plus 212 ft. Lazy Jay in Tiger Dust. House beats meets aggressive rap delivery.
    Art-pop deconstruction. Pairs with brat-mode as the hip-hop-inflected counterpart.

    '
  pads:
    1: KIK house deep thumping four-floor one-shot
    2: SNR sharp snappy tight crack one-shot
    3: HHT rapid rolling programmed trap one-shot
    4: CLP house clap reverb layered one-shot
    5: BAS house bouncing rolling sub bass loop
    6: VOX rapid-fire aggressive attitude rap loop
    7: SYN house stab bright filtered chord loop
    8: DRM house groove four-floor driving beat loop
    9: BAS acid squelch resonant 303 bass loop
    10: VOX chopped pitched processed diva vocal loop
    11: SYN dark arp menacing minor synth loop
    12: FX crowd hype energy attitude shout loop
bank_d:
  preset: genre/pop-punk-nostalgia
  name: Pop Punk Nostalgia
  bpm: 170
  key: C
  notes: 'Your followed artists (blink-182, New Found Glory, Fall Out Boy, Sublime),
    saved albums (Enema of the State, 40oz to Freedom), and playlist habits (Pop Punk''s
    Not Dead, 2000s Pop Punk Hits, SO FUCKIN'' 90s) all point here. Fast tempos, melodic
    vocals, teenage energy. Also pulls from the adjacent Paramore/Killers/Wheatus
    cluster. Reference tracks: Misery Business, Mr. Brightside, Teenage Dirtbag, What''s
    My Age Again.

    '
  pads:
    1: KIK punchy fast tight attack one-shot
    2: SNR cracking loud ringy pop one-shot
    3: HAT fast tight bright driving one-shot
    4: CYM ride bell energetic steady one-shot
    5: GTR power-chord crunchy palm-mute rhythm loop
    6: GTR octave riff clean melodic hook loop
    7: GTR lead distorted singable catchy loop
    8: BASS driving fast punk root-note loop
    9: VOX gang shout layered anthem one-shot
    10: VOX ooh-ahh melodic harmony stacked one-shot
    11: FX feedback squeal guitar noise one-shot
    12: PRC tom fill fast rolling descending one-shot
