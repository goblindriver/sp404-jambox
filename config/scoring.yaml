score_version: 8

# ══════════════════════════════════════════════════════════════
# Unified Scoring Engine — config/scoring.yaml
# ══════════════════════════════════════════════════════════════
#
# Both CLAP and legacy paths flow through scoring_engine.py.
# Every weight here is read by the code — no dead keys.
# Bumped to v8 after extracting hardcoded values and removing dead keys.

# Dimension weights — shared across CLAP and legacy paths.
# In CLAP mode, clap similarity is the primary signal.
# In legacy mode, tag_match is the primary signal.
clap:
  # Primary signal weights
  similarity_weight: 0.6           # CLAP cosine similarity (CLAP mode only)
  legacy_tag_match_weight: 0.6     # tag keyword matching (legacy mode only)

  # Type code: strongest structural signal — wrong type is a dealbreaker
  type_code_weight: 0.20

  # Structural bonus weights
  bpm_weight: 0.05
  key_weight: 0.03
  playability_weight: 0.15         # strong — wrong playability is bad
  duration_weight: 0.10
  energy_weight: 0.03
  danceability_weight: 0.03
  discogs_weight: 0.03
  quality_weight: 0.02
  plex_weight: 0.02
  instrument_hint_weight: 0.02
  performance_weight: 0.04

  # Sub-score tuning
  key_compatible_score: 0.33       # relative major/minor (not exact) match
  energy_mismatch_score: -0.66     # penalty for wrong energy level

  # Danceability
  danceability_bonus: 0.03
  danceability_threshold: 0.5

  # Discogs keyword scoring
  discogs_keyword_bonus: 0.018
  discogs_keyword_bonus_cap: 0.045

# SD Card performance intelligence — applies to both scoring paths
performance:
  pad_reuse: 4        # sample survived multiple sessions
  bpm_stable: 3       # user tweaked BPM = they cared
  high_velocity: 2    # played hard = liked it

# Legacy tag-based keyword matching weights.
# Used by _tag_match_score() for per-keyword scoring in both paths.
weights:
  keyword_dimension: 3       # keyword found in vibe/texture/genre
  keyword_tag: 2             # keyword found in general tags
  keyword_filename: 1        # keyword found in filename
  discogs_keyword_match: 2   # keyword found in Discogs tokens
  plex_moods_bonus: 1        # has Plex mood metadata
  plex_play_count_bonus: 2   # has Plex play count > 0
