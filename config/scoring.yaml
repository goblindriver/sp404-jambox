score_version: 6

# CLAP-powered scoring (primary — cosine similarity drives ranking)
# The CLAP similarity score (0.0-1.0) is the dominant signal.
# BPM and key provide small structural bonuses on top.
# Type_code and playability are hard filters, not score components.

clap:
  bpm_close_bonus: 0.05
  bpm_near_bonus: 0.02
  key_exact_bonus: 0.03
  key_compatible_bonus: 0.01
  playability_mismatch_penalty: -0.15
  duration_mismatch_penalty: -0.10
  min_similarity: 0.05
  danceability_bonus: 0.03
  danceability_threshold: 0.6
  discogs_keyword_bonus: 0.018
  discogs_keyword_bonus_cap: 0.045

# Legacy tag-based scoring (fallback when CLAP embeddings unavailable)
weights:
  type_exact: 10
  type_related: 3
  type_mismatch: -8
  playability_exact: 5
  playability_mismatch: -4
  bpm_close: 4
  bpm_near: 2
  bpm_distant: -1
  bpm_far: -2
  key_exact: 3
  key_compatible: 1
  keyword_dimension: 3
  keyword_tag: 2
  keyword_filename: 1
  discogs_keyword_match: 2
  oneshot_long_penalty: -3
  loop_short_penalty: -3
  plex_moods_bonus: 1
  plex_play_count_bonus: 2
  quality_tiebreaker: 0.5
  instrument_hint_match: 5
  energy_match: 3
  energy_mismatch: -2

  # SD Card Intelligence — performance-derived scoring signals
  performance_pattern_used: 4
  performance_bpm_adjust: 3
  performance_velocity_high: 2
  bed_complement: 3
  toolkit_survival: 5
  session_survival: 2
