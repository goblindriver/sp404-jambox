name: Basement Soul Telescope
slug: basement-soul-telescope
author: jambox
bpm: 98
key: G
notes: 'For when the block party still has light in the sky and you want pockets, not
  drops. Dusty kicks, neck-snap snares, warm Rhodes-adjacent loops, and chops that
  feel dug — not showroom-clean. Matches the Tiger Dust "Soul Kitchen" arc: golden-hour
  groove you can actually perform on, with room to get weirder later in the set.

  '
