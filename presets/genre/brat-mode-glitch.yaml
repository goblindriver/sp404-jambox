vibe: Broken screens and beautiful chaos — stuttered synths, crushed drums, digital
  wreckage as melody
notes: 'A texture-heavy variant of Brat Mode that leans into the SOPHIE / AG Cook
  / 100 gecs production side — granular glitch, buffer stutter, bitcrushed everything.
  Less pop structure, more sonic destruction as art. Reference the Brat Mode Sound
  Design doc sections on granular synthesis (3.1), buffer effects (3.2), and digital
  artifacts (3.4). Pairs with Brat Mode main preset — this one handles the weird pads
  while that one handles the bangers.

  '
