notes: 'A live-performance take on the synth-pop / art-pop lane you keep coming back
  to — granular shimmer, intimate vocals, and enough low-end to move bodies (not just
  headphones). Pairs emotionally with Purity Ring Dreams but chases the same "make people
  dance" rule as the rest of Jambox: pretty sounds, rude subs when you need them.

  '
