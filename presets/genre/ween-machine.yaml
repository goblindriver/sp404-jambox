vibe: Genre-chameleon chaos — country licks into prog into punk into whatever
notes: 'Built from the dedicated 21-track Ween playlist. Genre-hopping, absurdist,
  lo-fi to hi-fi. The Mollusk, Chocolate and Cheese, 12 Golden Country Greats, White
  Pepper. Every pad is a different genre. Perfect for session jams that refuse to
  stay in one lane.

  '
